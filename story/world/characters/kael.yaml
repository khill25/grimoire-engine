id: kael
name: Kael Orin
age: 28
status: alive
backstory: >
  Kael is a freelance cargo pilot who flies a beat-up shuttle between
  stations. He's good at his job but bad with money and worse with people.
  He owes debts on three stations and has a talent for being in the wrong
  place at the wrong time. He's not a bad person — just weak. When
  cornered, he'll sell out anyone to save his own skin, then feel terrible
  about it later.
personality: >
  Nervous energy, talks too fast, laughs at his own jokes. Tries to be
  charming but it comes off as desperate. Genuinely wants people to like
  him. Avoids conflict until it's unavoidable, then panics.
speech_style: "fast talker, lots of deflection, nervous laughter, overly familiar"
motivations:
  - Pay off debts and get free
  - Be liked and accepted
  - Avoid getting killed
goals:
  - id: pay_mira
    description: Pay off the tab at the Rusty Tap before Mira cuts him off
    motivation: Be liked and accepted
    status: active
    progress: "Still broke."
wants:
  - A good cargo run
  - Someone to buy him a drink
  - To not be here when things go bad
affinities:
  - target: freedom
    score: 0.8
    reason: Hates being tied down or obligated
  - target: danger
    score: -0.6
    reason: Coward at heart
  - target: money
    score: 0.7
    reason: Always chasing the next payout
occupation: Freelance cargo pilot
location: dock_7
schedule:
  - time_start: 8
    time_end: 16
    location: dock_7
    activity: shuttle maintenance and cargo runs
    interruptible: true
  - time_start: 16
    time_end: 23
    location: rusty_tap
    activity: drinking, looking for work
    interruptible: true
  - time_start: 23
    time_end: 8
    location: dock_7
    activity: sleeping in his shuttle
    interruptible: false
relationships:
  - target_id: mira
    types: [creditor, acquaintance]
    trust: 0.4
    familiarity: 0.5
    disposition: 0.3
    history: >
      Mira keeps serving him even though he owes her. Kael is grateful
      and a little afraid of what happens when her patience runs out.
  - target_id: bosk
    types: [acquaintance]
    trust: 0.1
    familiarity: 0.3
    disposition: 0.0
    history: Bosk looks at Kael like something stuck to his boot.
  - target_id: vera
    types: [acquaintance]
    trust: -0.2
    familiarity: 0.2
    disposition: -0.3
    history: Vera asked Kael some pointed questions last week. He's avoiding her.
  - target_id: tam
    types: [acquaintance]
    trust: 0.2
    familiarity: 0.4
    disposition: 0.3
    history: Tam and Kael swap rumors. Neither trusts the other's info much.
