id: bosk_union_talk
character_id: bosk
context: first_meeting
root_node: approach

nodes:
  - id: approach
    speaker: bosk
    text: >
      Bosk looks up from his drink. Heavy brow, scarred hands wrapped
      around a glass. He doesn't smile. "Yeah?"
    choices:
      - id: mira_sent_me
        text: "Mira sent me. Said you might know about work."
        next_node: mira_referral
        condition: "mira_referral == true"
      - id: ask_about_union
        text: "I hear you're the union rep."
        next_node: union_intro
      - id: just_talking
        text: "Just making conversation."
        next_node: cold_response
    llm_escape: true
    is_key_moment: false

  - id: mira_referral
    speaker: bosk
    text: >
      Something shifts in his expression — not warmer, but less hostile.
      "Mira sent you." He takes a long pull from his drink. "Sit down.
      What kind of work are you looking for?"
    state_changes:
      bosk_willing_to_talk: true
    choices:
      - id: dock_work
        text: "Honest dock work. I can haul cargo."
        next_node: dock_work_offer
      - id: union_business
        text: "Something that matters. I've heard the union is under pressure."
        next_node: union_pressure
      - id: anything_available
        text: "Whatever's available. I'm not picky."
        next_node: dock_work_offer
    llm_escape: true
    is_key_moment: false

  - id: union_intro
    speaker: bosk
    text: >
      "Union rep. Dockworker. General pain in management's ass." He
      doesn't seem proud or modest about it — just stating facts.
      "What's it to you?"
    choices:
      - id: want_to_join
        text: "I might want to join up. What's the situation?"
        next_node: union_pressure
      - id: curious
        text: "Just curious. I'm new on the station."
        next_node: new_person_suspicion
      - id: heard_rumors
        text: "I heard things are tense with management."
        next_node: union_pressure
    llm_escape: true
    is_key_moment: false

  - id: cold_response
    speaker: bosk
    text: >
      Bosk stares at you for a long moment. "I don't do conversation."
      He goes back to his drink.
    choices:
      - id: persist
        text: "Look, I'm new here. Just trying to get my bearings."
        next_node: new_person_suspicion
      - id: leave
        text: "Fair enough."
        next_node: conversation_end_cold
    llm_escape: false
    is_key_moment: false

  - id: new_person_suspicion
    speaker: bosk
    text: >
      "New." He says it like he's chewing on something bitter. "We get
      new people sometimes. Some of them work out. Some of them are
      here to ask questions for people I don't like." He meets your
      eyes. "Which one are you?"
    choices:
      - id: honest_answer
        text: "I'm just looking for a place to land. No agenda."
        next_node: bosk_tests
      - id: direct
        text: "I'm not a spy, if that's what you're asking."
        next_node: bosk_tests
      - id: offended
        text: "I don't answer to you."
        next_node: conversation_end_cold
    llm_escape: true
    is_key_moment: true

  - id: bosk_tests
    speaker: bosk
    text: >
      He watches you for a long, uncomfortable moment. Then he sighs —
      deep, tired, the sigh of a man who's been doing this too long.
      "Everyone's got an agenda. At least you're not pretending." He
      pushes out the chair across from him with his boot. "Sit."
    state_changes:
      bosk_willing_to_talk: true
    choices:
      - id: sit_ask_union
        text: >
          "Thanks." Sit down. "So what's happening with the union?"
        next_node: union_pressure
      - id: sit_ask_work
        text: >
          "Thanks." Sit down. "I could use work, if you've got it."
        next_node: dock_work_offer
    llm_escape: false
    is_key_moment: true

  - id: union_pressure
    speaker: bosk
    text: >
      Bosk's jaw tightens. "Management wants to push through an
      automation clause in the new contract. Replace half the dock
      crews with loader bots." He taps the table. "Two hundred people
      out of work. Families. This station doesn't have a safety net."
      He looks at you hard. "The negotiations are stalled. They're
      trying to starve us out."
    state_changes:
      knows_union_situation: true
    choices:
      - id: offer_help
        text: "Is there anything I can do to help?"
        next_node: help_offer
      - id: ask_plan
        text: "What's the union's plan?"
        next_node: union_plan
      - id: sympathize
        text: "That's rough. I've seen it happen on other stations."
        next_node: solidarity_moment
    llm_escape: true
    is_key_moment: true

  - id: union_plan
    speaker: bosk
    text: >
      Bosk looks around the bar, then back at you. His voice drops.
      "We negotiate. That's the plan. That's always the plan." A
      pause that says more than his words. "Some people think
      negotiation isn't enough anymore. I'm not one of those people."
      Another pause. "Yet."
    state_changes:
      bosk_hinted_at_resistance: true
    choices:
      - id: push_further
        text: "What would 'enough' look like?"
        next_node: bosk_shuts_down
      - id: respect_boundary
        text: "I hear you. If you need an extra hand, I'm around."
        next_node: conversation_end_warm
      - id: dock_work_pivot
        text: "Well, if the docks still need workers, I'm available."
        next_node: dock_work_offer
    llm_escape: true
    is_key_moment: true

  - id: bosk_shuts_down
    speaker: bosk
    text: >
      Something closes behind his eyes. "It would look like people
      minding their own business." He finishes his drink. "You ask a
      lot of questions for someone who just got here."
    state_changes:
      bosk_suspicious_of_player: true
    choices:
      - id: back_off
        text: "You're right. Sorry. I'll let you drink in peace."
        next_node: conversation_end_neutral
      - id: earn_trust
        text: "I ask questions because I give a damn. But I'll earn that trust."
        next_node: bosk_grudging_respect
    llm_escape: false
    is_key_moment: true

  - id: bosk_grudging_respect
    speaker: bosk
    text: >
      He stares at you for a moment, then — not a smile exactly,
      but the lines around his eyes soften a fraction. "Talk is cheap.
      Show up at Dock 7 tomorrow morning. We'll see what you're made of."
    state_changes:
      dock_work_offered: true
      bosk_grudging_respect: true
    choices:
      - id: accept
        text: "I'll be there."
        next_node: conversation_end_warm
    llm_escape: false
    is_key_moment: true

  - id: help_offer
    speaker: bosk
    text: >
      Bosk studies you. "Maybe. We always need hands on the dock —
      real work, heavy lifting. Show up, do the work, keep your mouth
      shut about what you see." He holds up a finger. "And I mean shut.
      Vera — station security — she's been sniffing around. Last thing
      we need is another leak."
    state_changes:
      dock_work_offered: true
      knows_vera_is_watching: true
    choices:
      - id: accept_terms
        text: "I can do that. When do I start?"
        next_node: conversation_end_warm
      - id: ask_about_vera
        text: "Vera? What's her deal?"
        next_node: vera_warning
    llm_escape: true
    is_key_moment: false

  - id: vera_warning
    speaker: bosk
    text: >
      "Station security. Thinks she's smart." He scowls. "She is smart.
      That's the problem. She knows something's up with the union but
      can't prove it. Don't give her anything to work with."
    state_changes:
      warned_about_vera: true
    choices:
      - id: understood
        text: "Understood. I'll keep my head down."
        next_node: conversation_end_warm
    llm_escape: false
    is_key_moment: false

  - id: solidarity_moment
    speaker: bosk
    text: >
      Something flickers across his face — recognition, maybe.
      "Yeah? Where?" He leans forward slightly. For the first time,
      he looks at you like a person instead of a potential problem.
    choices:
      - id: share_story
        text: "Mining platform, outer rim. Same playbook — automate, cut costs, dump the workers."
        next_node: shared_experience
      - id: vague
        text: "Around. It's the same story everywhere."
        next_node: dock_work_offer
    llm_escape: true
    is_key_moment: false

  - id: shared_experience
    speaker: bosk
    text: >
      Bosk nods slowly. "Same story. Different station." He's quiet
      for a moment, then extends a scarred hand across the table.
      "Bosk Renner. Welcome to Lowport."
    state_changes:
      bosk_trust_initial: true
      dock_work_offered: true
    choices:
      - id: shake
        text: Shake his hand. "Good to meet you, Bosk."
        next_node: conversation_end_warm
    llm_escape: false
    is_key_moment: true

  - id: dock_work_offer
    speaker: bosk
    text: >
      "Show up at Dock 7 at oh-five-hundred. Ask for me. The work's
      hard and the pay's not great, but it's honest." He shrugs.
      "More than most can say on this station."
    state_changes:
      dock_work_offered: true
    choices:
      - id: accept_work
        text: "I'll be there. Thanks."
        next_node: conversation_end_warm
      - id: decline
        text: "I'll think about it."
        next_node: conversation_end_neutral
    llm_escape: false
    is_key_moment: false

  - id: conversation_end_warm
    speaker: bosk
    text: >
      Bosk nods once, firm. "All right then." He lifts his glass in
      the smallest of toasts and goes back to his drink.
    choices: []
    llm_escape: false
    is_key_moment: false

  - id: conversation_end_neutral
    speaker: bosk
    text: >
      Bosk grunts and turns back to his drink. Conversation over.
    choices: []
    llm_escape: false
    is_key_moment: false

  - id: conversation_end_cold
    speaker: bosk
    text: >
      Bosk's expression goes flat. He looks away. You've been dismissed.
    choices: []
    llm_escape: false
    is_key_moment: false
