title: Lowport Station — Act 1
description: >
  The player arrives on Lowport Station and gets drawn into the
  conflict between the Dockworkers Union and station management.
  Under the surface, a resistance cell is forming.

acts:
  - id: act_1
    name: Arrival
    description: >
      Player arrives, meets the key characters, establishes
      relationships, and learns about the union conflict.
    beats:
      - id: beat_arrive
        name: New in Town
        description: Player arrives and explores the lower docks.
        trigger:
          type: automatic
        status: active

      - id: beat_meet_mira
        name: Meet Mira
        description: Player has a conversation with Mira at the Rusty Tap.
        trigger:
          type: event
          condition: "talked_to:mira"
        status: pending

      - id: beat_meet_bosk
        name: Meet Bosk
        description: Player meets Bosk and learns about the union situation.
        trigger:
          type: event
          condition: "talked_to:bosk"
        status: pending

      - id: beat_dock_work
        name: First Shift
        description: Player works a shift at Dock 7, sees the conditions firsthand.
        trigger:
          type: flag
          condition: "dock_work_offered == true"
        deadline: 48  # ticks — if player doesn't pursue, Storyteller generates a hook
        status: pending

      - id: beat_vera_encounter
        name: Security Interest
        description: Vera takes notice of the player and asks some questions.
        trigger:
          type: event
          condition: "visited:dock_7 and tick > 24"
        status: pending

      - id: beat_union_meeting
        name: The Meeting
        description: >
          Bosk invites the player to a private union meeting.
          This is where the resistance subplot begins.
        trigger:
          type: flag
          condition: "bosk_trust_initial == true and knows_union_situation == true"
        deadline: 72
        status: pending
        allow_off_rails: true
