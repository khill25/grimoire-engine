id: mira_first_meeting
character_id: mira
context: first_meeting
root_node: greeting

nodes:
  - id: greeting
    speaker: mira
    text: >
      Mira looks up from the glass she's polishing. "New face. What'll it be?"
    choices:
      - id: ask_about_docks
        text: "What's the word on the docks today?"
        next_node: docks_gossip
      - id: looking_for_work
        text: "I'm looking for work."
        next_node: work_inquiry
      - id: just_a_drink
        text: "Just a drink."
        next_node: drink_served
    llm_escape: true
    is_key_moment: false

  - id: docks_gossip
    speaker: mira
    text: >
      Mira glances at the door before answering. "Same as always. Ships come
      in, ships go out." She leans in, dropping her voice. "Though I heard
      the Union's planning something big with the new contract talks.
      You didn't hear that from me."
    state_changes:
      mira_mentioned_union: true
    choices:
      - id: ask_more_union
        text: "What kind of something?"
        next_node: union_details
        condition: null
      - id: who_to_talk_to
        text: "Who should I talk to about that?"
        next_node: bosk_referral
      - id: change_subject
        text: "Interesting. So about that drink..."
        next_node: drink_served
    llm_escape: true
    is_key_moment: false

  - id: union_details
    speaker: mira
    text: >
      Mira's expression closes off just slightly. "The kind of something
      that's none of my business. Or yours." She goes back to polishing
      the glass. "I just pour drinks. You want to know about union
      politics, talk to Bosk. Corner table. Big guy, looks tired."
    state_changes:
      knows_bosk_location: true
    choices:
      - id: push_mira
        text: "You seem to know more than you're letting on."
        next_node: mira_deflects
        condition: null
      - id: accept_redirect
        text: "Fair enough. I'll talk to Bosk."
        next_node: conversation_end_bosk
      - id: drop_it_drink
        text: "Forget I asked. Just the drink."
        next_node: drink_served
    llm_escape: true
    is_key_moment: true

  - id: mira_deflects
    speaker: mira
    text: >
      Mira gives you a long, measuring look. The warmth doesn't leave
      her eyes but something harder moves behind it. "Bartenders hear
      things. Doesn't mean we know things." A beat. "You're new here.
      Free advice — on this station, people who ask too many questions
      too fast tend to find answers they weren't ready for."
    state_changes:
      mira_suspicious_of_player: true
    choices:
      - id: apologize
        text: "Point taken. Sorry."
        next_node: drink_served
      - id: be_direct
        text: "I can handle answers. I'm not here to cause trouble."
        next_node: mira_considers
    llm_escape: false
    is_key_moment: true

  - id: mira_considers
    speaker: mira
    text: >
      She holds your gaze for a moment, then something shifts — the
      tiniest nod, like she's filed you away in a new category. "Nobody
      who causes trouble says that." She pours a drink and slides it
      across. "On the house. First one's free for people who aren't
      here to cause trouble."
    state_changes:
      mira_initial_impression: positive
      got_free_drink: true
    choices:
      - id: thanks_ask_around
        text: "Thanks. Mind if I ask around?"
        next_node: conversation_end_friendly
      - id: thanks_quiet
        text: "Thanks. I'll keep to myself."
        next_node: conversation_end_neutral
    llm_escape: false
    is_key_moment: true

  - id: bosk_referral
    speaker: mira
    text: >
      "Bosk Renner. Corner table, big guy, permanent scowl. He's the
      union rep — if anyone knows what's happening on the docks, it's
      him." She pauses. "Tell him Mira sent you. Might help. Might not."
    state_changes:
      knows_bosk_location: true
      mira_referral: true
    choices:
      - id: thanks_go_to_bosk
        text: "Thanks, I'll go talk to him."
        next_node: conversation_end_bosk
      - id: drink_first
        text: "I'll check in with him. But first — that drink."
        next_node: drink_served
    llm_escape: false
    is_key_moment: false

  - id: work_inquiry
    speaker: mira
    text: >
      "Work." She looks you over, taking stock. "Depends on what kind.
      The docks always need hands — talk to the union rep, Bosk, corner
      table. If you're looking for something less... official, you might
      check the job board by Dock 7. Just read the fine print."
    state_changes:
      knows_bosk_location: true
    choices:
      - id: dock_work
        text: "Honest dock work sounds fine."
        next_node: bosk_referral
      - id: unofficial
        text: "What kind of unofficial work?"
        next_node: unofficial_work
      - id: nevermind
        text: "I'll figure it out. Just a drink for now."
        next_node: drink_served
    llm_escape: true
    is_key_moment: false

  - id: unofficial_work
    speaker: mira
    text: >
      Mira raises an eyebrow. "I wouldn't know anything about that.
      I run a bar." But the corner of her mouth twitches. "The job
      board. Dock 7. Some postings don't ask for a resume."
    choices:
      - id: got_it
        text: "Understood. Thanks."
        next_node: drink_served
      - id: press_mira
        text: "Come on, you clearly know people."
        next_node: mira_deflects
    llm_escape: false
    is_key_moment: false

  - id: drink_served
    speaker: mira
    text: >
      Mira pours something amber into a glass that's almost clean.
      "Three credits." She slides it across with practiced ease.
      "Welcome to the Rusty Tap. Try not to start any fights —
      I just fixed that stool."
    state_changes:
      visited_rusty_tap: true
    choices:
      - id: pay_and_look_around
        text: >
          "Thanks." Pay and look around the bar.
        next_node: conversation_end_neutral
      - id: ask_about_regulars
        text: "Who are the regulars here?"
        next_node: regulars_info
    llm_escape: true
    is_key_moment: false

  - id: regulars_info
    speaker: mira
    text: >
      Mira nods toward the room. "Bosk in the corner — union rep,
      don't piss him off. The jumpy one by the door is Kael, a pilot.
      Owes me money." She smirks. "Tam pokes his head in most evenings,
      runs the supply shop. Knows everyone's business. And sometimes
      Vera from station security drops by to pretend she's off duty."
    state_changes:
      knows_regulars: true
      knows_bosk_location: true
    choices:
      - id: end_chat
        text: "Good to know. Thanks."
        next_node: conversation_end_neutral
    llm_escape: true
    is_key_moment: false

  - id: conversation_end_bosk
    speaker: mira
    text: >
      Mira nods and goes back to her work. "Good luck."
    choices: []
    llm_escape: false
    is_key_moment: false

  - id: conversation_end_friendly
    speaker: mira
    text: >
      "Ask away. Just remember who poured you the free drink." She
      winks and moves down the bar.
    choices: []
    llm_escape: false
    is_key_moment: false

  - id: conversation_end_neutral
    speaker: mira
    text: >
      Mira nods and turns to another customer.
    choices: []
    llm_escape: false
    is_key_moment: false
