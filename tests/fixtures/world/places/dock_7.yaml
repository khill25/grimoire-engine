id: dock_7
name: Dock 7
type: docking_bay
description: >
  A cavernous docking bay scarred by decades of use. Cargo containers
  are stacked three high along the walls. Gantry cranes creak overhead.
  The floor is oil-stained plasteel with faded safety lines nobody
  follows anymore. Dock 7 handles most of the station's legitimate
  cargo — and some that isn't.
current_state: active, mid-shift bustle
connections: [rusty_tap]
region: lower_docks
default_npcs: [bosk, kael, tam]
current_npcs: [bosk, kael, tam, vera]
is_public: true
owner: dockworkers_union
atmosphere: >
  Industrial noise, shouting workers, the hiss of hydraulics.
  Smells like ozone and lubricant. Everything echoes.
