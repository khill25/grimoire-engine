id: tam
name: Tam Sola
age: 45
status: alive
backstory: >
  Tam runs a small supply shop wedged between Dock 7 and the Rusty Tap.
  He sells tools, ration packs, and secondhand electronics. But his real
  trade is information. Tam listens to everyone, remembers everything, and
  sells what he knows to whoever's buying. He's survived this long because
  he's useful to all sides and threatening to none. He has no ideology —
  just a keen sense of which way the wind blows and the good sense to
  stand downwind.
personality: >
  Chatty, warm, always smiling. Makes everyone feel like his best friend.
  Underneath the friendliness is a calculating mind that's always
  weighing what information is worth. Never takes sides because sides
  are bad for business.
speech_style: "chatty, lots of questions, folksy wisdom, changes subject smoothly, never gives a straight answer"
motivations:
  - Stay useful to everyone
  - Protect his business
  - Know everything that happens on the lower docks
goals:
  - id: stay_neutral
    description: Keep selling information without getting caught in the crossfire
    motivation: Stay useful to everyone
    status: active
    progress: "Getting harder. Tensions are rising."
wants:
  - New inventory shipment
  - Find out what the union is actually planning
  - Keep Vera happy enough to leave him alone
affinities:
  - target: gossip
    score: 0.9
    reason: Information is his lifeblood
  - target: conflict
    score: -0.7
    reason: Bad for business
  - target: community
    score: 0.5
    reason: Genuinely likes the people down here, even if he'd sell them out
occupation: Shopkeeper
location: dock_7
schedule:
  - time_start: 7
    time_end: 19
    location: dock_7
    activity: running the shop
    interruptible: true
  - time_start: 19
    time_end: 22
    location: rusty_tap
    activity: socializing, gathering gossip
    interruptible: true
  - time_start: 22
    time_end: 7
    location: dock_7
    activity: sleeping in the back of the shop
    interruptible: false
relationships:
  - target_id: mira
    types: [acquaintance, customer]
    trust: 0.3
    familiarity: 0.6
    disposition: 0.4
    history: >
      Mira buys supplies from Tam and they trade small talk.
      Tam suspects she knows more than she lets on but doesn't push.
  - target_id: bosk
    types: [acquaintance]
    trust: 0.2
    familiarity: 0.4
    disposition: 0.2
    history: >
      Bosk buys tools and occasionally vents about management.
      Tam listens sympathetically and files it away.
  - target_id: kael
    types: [acquaintance]
    trust: 0.2
    familiarity: 0.4
    disposition: 0.3
    history: Kael and Tam swap rumors over cheap drinks.
  - target_id: vera
    types: [informant_for, acquaintance]
    trust: 0.1
    familiarity: 0.5
    disposition: 0.1
    history: >
      Vera pays for information with overlooked infractions.
      Tam gives her just enough to stay useful.
faction_ids: []
