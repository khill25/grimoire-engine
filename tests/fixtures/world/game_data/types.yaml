stats:
  - id: will
    name: Will
    description: The ability to impose your existence onto reality. Rigid, protective, forceful.
    primary: true
  - id: emotion
    name: Emotion
    description: Unfiltered wild energy. Volatile, bright, passionate, impulsive.
    primary: true
  - id: mind
    name: Mind
    description: The perception of how things are connected. Mathematical, geometric, logical.
    primary: true
  - id: understanding
    name: Understanding
    description: The power to undo, remake, and reshape. Derived from balance of other pillars.
    primary: false
    derived: true
    formula: average
    sources:
